<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EyeCode - Iris AI Devbox</title>

    <!-- Prevent theme flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("eyecode-theme") || "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>

    <!-- Tabler Icons Webfont -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"
    />

    <!-- JSZip for zip downloads -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <style>
      :root {
        --bg-screen: #000;
        --bg-sidebar: #08090b;
        --bg-header: #16181d;
        --bg-input: #1e2127;
        --bg-bubble-user: #25e69e;
        --bg-bubble-llm: #1e2127;
        --bg-bubble-sys: #16181d;
        --bg-terminal: #0a0c0f;
        --bg-toggle: #121418;

        --border-color: #2a2e36;
        --border-active: #25e69e;
        --text-primary: #9ca3af;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;

        --accent: #25e69e;
        --accent-hover: #1bc985;
        --terminal-green: #4ade80;
        --terminal-border: #334155;

        --pane-bg: #121418;
        --hover-bg: #1a1c21;
        --files-bg: #08090b;
        --term-header-bg: #121418;
        --scrollbar-thumb: #3a3f47;
        --on-accent-text: #002418;
        --user-bubble-text: #08090b;
        --loader-dot: #fff;
        --reasoning-text: #94a3b8;
        --reasoning-border: #333;
        --shadow-color: rgba(0, 0, 0, 0.2);

        --danger: #ef4444;
        --danger-hover: #dc2626;
        --danger-bg: rgba(239, 68, 68, 0.1);
        --success-bg: rgba(37, 230, 158, 0.1);
      }

      [data-theme="light"] {
        --bg-screen: #ffffff;
        --bg-sidebar: #f5f5f7;
        --bg-header: #ebebee;
        --bg-input: #e3e3e8;
        --bg-bubble-user: #25e69e;
        --bg-bubble-llm: #e3e3e8;
        --bg-bubble-sys: #ebebee;
        --bg-terminal: #f8f8fa;
        --bg-toggle: #e6e6ea;

        --border-color: #d4d4dc;
        --border-active: #25e69e;
        --text-primary: #1f2937;
        --text-secondary: #374151;
        --text-muted: #6b7280;

        --accent: #25e69e;
        --accent-hover: #1bc985;
        --terminal-green: #15803d;
        --terminal-border: #cbd5e1;

        --pane-bg: #e6e6ea;
        --hover-bg: #d8d8de;
        --files-bg: #f5f5f7;
        --term-header-bg: #e6e6ea;
        --scrollbar-thumb: #b0b0bc;
        --on-accent-text: #002418;
        --user-bubble-text: #04130d;
        --loader-dot: #2d2d33;
        --reasoning-text: #64748b;
        --reasoning-border: #cbd5e1;
        --shadow-color: rgba(0, 0, 0, 0.08);

        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --danger-bg: rgba(220, 38, 38, 0.1);
        --success-bg: rgba(37, 230, 158, 0.15);
      }

      * {
        box-sizing: border-box;
        border-radius: 0 !important;
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--bg-header);
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        background: var(--bg-screen);
        color: var(--text-primary);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Helvetica Neue", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        overflow: hidden;
        transition: background 0.25s ease, color 0.25s ease;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-header);
        border-left: 1px solid var(--border-color);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border: 2px solid var(--bg-header);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      /* Layout */
      .left-pane {
        flex: 1 1 auto;
        min-width: 300px;
        display: flex;
        flex-direction: column;
        background: var(--pane-bg);
        border-right: 1px solid var(--border-color);
        overflow: hidden;
        transition: background 0.25s ease, border-color 0.25s ease;
      }

      #resizer {
        flex: 0 0 6px;
        width: 6px;
        background: var(--bg-toggle);
        border-left: 1px solid var(--border-color);
        border-right: 1px solid var(--border-color);
        cursor: col-resize;
        position: relative;
        z-index: 10;
        transition: background 0.2s;
      }
      #resizer:hover,
      #resizer.active {
        background: var(--accent);
      }

      .left-toggle {
        display: flex;
        background: var(--bg-toggle);
        border-bottom: 1px solid var(--border-color);
        height: 48px;
        flex-shrink: 0;
      }
      .left-toggle button {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-right: 1px solid var(--border-color);
        transition: background 0.2s, color 0.2s;
      }
      .left-toggle button:last-child {
        border-right: none;
      }
      .left-toggle button:hover {
        background: var(--hover-bg);
        color: var(--text-secondary);
      }
      .left-toggle button.active {
        color: var(--accent);
        background: var(--bg-screen);
        border-bottom: 2px solid var(--accent);
      }

      .content-wrapper {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #screen {
        background: var(--bg-screen);
        width: 100%;
        height: 100%;
        display: block;
      }

      .view-pane {
        position: absolute;
        inset: 0;
        background: var(--files-bg);
        overflow-y: auto;
        padding: 24px;
        display: none;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        align-content: start;
      }
      .view-pane.active {
        display: grid;
      }
      #changes-view {
        display: none;
        flex-direction: column;
        gap: 0;
        padding: 0;
      }
      #changes-view.active {
        display: flex;
      }

      /* Cards & Files */
      .file-card,
      .change-card {
        background: var(--bg-bubble-llm);
        border: 1px solid var(--border-color);
        transition: border-color 0.2s, transform 0.1s, background 0.25s ease;
      }
      .file-card {
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        position: relative;
      }
      .file-card:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .file-card i {
        font-size: 32px;
        color: var(--text-secondary);
      }
      .file-card span {
        font-family: "Monaco", monospace;
        font-size: 12px;
        color: var(--text-primary);
        text-align: center;
        word-break: break-all;
      }

      .change-card {
        margin: 8px 12px;
        overflow: visible;
      }
      .change-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
        background: var(--bg-header);
        cursor: pointer;
        border-bottom: 1px solid var(--border-color);
        transition: background 0.2s;
      }
      .change-card-header:hover {
        background: var(--hover-bg);
      }
      .change-card-header .filename {
        flex: 1;
        font-family: "Monaco", monospace;
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 600;
      }
      .change-card-header .change-count {
        font-size: 11px;
        color: var(--text-muted);
        padding: 3px 8px;
        border: 1px solid var(--border-color);
        background: var(--bg-input);
      }
      .toggle-icon {
        color: var(--text-muted);
        transition: transform 0.2s;
      }
      .change-card-body {
        padding: 16px;
        display: none;
        flex-direction: column;
        gap: 16px;
      }

      .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--text-muted);
        margin-top: 40px;
      }
      .empty-state i {
        font-size: 48px;
        display: block;
        margin-bottom: 16px;
      }

      /* View Action Bar */
      .view-action-bar {
        grid-column: 1 / -1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        padding: 0 0 16px 0;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 8px;
      }

      /* Dropdown Menu */
      .dropdown-wrapper {
        position: relative;
        display: inline-block;
      }

      .dropdown-trigger {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        cursor: pointer;
        padding: 0;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .dropdown-trigger:hover {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--hover-bg);
      }

      .dropdown-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 4px);
        min-width: 180px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 16px var(--shadow-color);
        z-index: 1000;
        display: none;
        flex-direction: column;
        padding: 4px;
      }
      .dropdown-menu.show {
        display: flex;
      }

      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-align: left;
        width: 100%;
        transition: background 0.15s, color 0.15s;
        font-family: inherit;
        height: auto;
        flex: none;
      }
      .dropdown-item:hover {
        background: var(--hover-bg);
        color: var(--accent);
      }
      .dropdown-item i {
        font-size: 16px;
        width: 20px;
        text-align: center;
        flex-shrink: 0;
      }
      .dropdown-item.danger:hover {
        background: var(--danger-bg);
        color: var(--danger);
      }

      /* File card dropdown positioning */
      .file-card .dropdown-wrapper {
        position: absolute;
        top: 8px;
        right: 8px;
      }
      .file-card .dropdown-trigger {
        opacity: 0;
        transition: opacity 0.2s;
      }
      .file-card:hover .dropdown-trigger {
        opacity: 1;
      }

      /* Changes View Header */
      .changes-header {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        flex-shrink: 0;
        background: var(--files-bg);
      }

      .clear-difflog-btn {
        width: 100%;
        max-width: 500px;
        height: 52px;
        background: var(--accent) !important;
        color: #fff !important;
        font-size: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: none !important;
        gap: 10px;
      }
      .clear-difflog-btn:hover {
        background: var(--accent-hover) !important;
        color: #fff !important;
      }
      .clear-difflog-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Session Separator */
      .session-separator {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 24px 8px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .session-separator::before,
      .session-separator::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }
      .session-separator .session-label {
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .session-separator .session-label i {
        font-size: 14px;
      }

      /* Changes view body wrapper */
      .changes-body {
        flex: 1;
        overflow-y: auto;
      }

      /* Change card header dropdown */
      .change-card-header .dropdown-wrapper {
        flex-shrink: 0;
        margin-left: 4px;
      }

      /* Right Sidebar */
      #sidebar {
        display: flex;
        flex-direction: column;
        flex: 0 0 440px;
        min-width: 320px;
        background: var(--bg-sidebar);
        overflow: hidden;
        transition: background 0.25s ease;
      }

      .sidebar-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-color);
        background: var(--bg-header);
        transition: background 0.25s ease, border-color 0.25s ease;
      }

      .header-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .session-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 40px;
        padding: 0 16px;
        background: transparent;
        border: 1px solid var(--border-color);
        font-family: "Monaco", monospace;
        font-size: 12px;
        color: var(--text-secondary);
        flex: 1;
        transition: border-color 0.2s;
      }
      .session-badge i {
        font-size: 14px;
        color: var(--text-muted);
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
      .theme-toggle i {
        font-size: 18px;
      }

      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* Chat Messages */
      .chat-message {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-width: 90%;
      }
      .chat-message.user {
        align-self: flex-end;
      }
      .chat-message.system {
        align-self: center;
        max-width: 100%;
      }

      .message-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
      }
      .message-header i {
        font-size: 14px;
      }
      .chat-message.user .message-header {
        justify-content: flex-end;
      }

      .message-content {
        padding: 12px 16px;
        word-wrap: break-word;
        white-space: pre-wrap;
        font-size: 14px;
        line-height: 1.5;
        border: 1px solid var(--border-color);
        transition: background 0.25s ease, color 0.25s ease,
          border-color 0.25s ease;
      }
      .message-content.user {
        background: var(--bg-bubble-user);
        color: var(--user-bubble-text);
        border-color: var(--accent-hover);
        font-weight: 500;
        box-shadow: 0 2px 5px var(--shadow-color);
      }
      .message-content.llm {
        background: var(--bg-bubble-llm);
        color: var(--text-primary);
      }
      .message-content.system {
        background: var(--bg-bubble-sys);
        border: 1px dashed var(--border-color);
        color: var(--text-secondary);
        font-size: 13px;
        text-align: center;
        padding: 8px 16px;
      }

      .chat-attachments {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-width: 100%;
        justify-content: flex-end;
      }

      /* Terminal & Diff Blocks */
      .terminal-block,
      .diff-block {
        background: var(--bg-terminal);
        border: 1px solid var(--terminal-border);
        overflow: hidden;
        width: 100%;
      }
      .terminal-header,
      .diff-header {
        background: var(--term-header-bg);
        padding: 8px 12px;
        border-bottom: 1px solid var(--terminal-border);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 600;
        font-family: "Monaco", monospace;
      }
      .terminal-header .dot {
        width: 10px;
        height: 10px;
        background: #555;
      }
      .terminal-header .dot.red {
        background: #ff5f56;
      }
      .terminal-header .dot.yellow {
        background: #ffbd2e;
      }
      .terminal-header .dot.green {
        background: #27c93f;
      }

      .terminal-body {
        padding: 12px;
        font-family: "Monaco", monospace;
        font-size: 12px;
        color: var(--terminal-green);
        white-space: pre-wrap;
        word-break: break-all;
      }
      .terminal-body .reasoning {
        color: var(--reasoning-text);
        display: block;
        margin-bottom: 8px;
        font-style: italic;
        border-bottom: 1px dashed var(--reasoning-border);
        padding-bottom: 8px;
      }

      .diff-body {
        font-family: "Monaco", monospace;
        font-size: 12px;
        padding: 8px 0;
        overflow-x: auto;
      }
      .diff-line {
        display: flex;
        padding: 2px 12px;
        white-space: pre;
        align-items: center;
      }
      .diff-line .line-num {
        width: 30px;
        text-align: right;
        margin-right: 8px;
        color: var(--text-muted);
        user-select: none;
        flex-shrink: 0;
        font-size: 11px;
      }
      .diff-line .line-sign {
        width: 15px;
        margin-right: 8px;
        flex-shrink: 0;
        font-weight: bold;
      }
      .diff-line .line-text {
        flex-grow: 1;
      }
      .diff-line.added {
        background: var(--success-bg);
        color: var(--accent);
      }
      .diff-line.removed {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .diff-line.context {
        color: var(--text-secondary);
      }

      .files-section {
        background: var(--bg-bubble-llm);
        border: 1px solid var(--border-color);
        padding: 12px;
        width: 100%;
      }
      .files-title {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 12px;
      }
      .file-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: var(--bg-terminal);
        font-family: "Monaco", monospace;
        font-size: 12px;
        color: var(--text-primary);
        margin-bottom: 6px;
        border: 1px solid var(--border-color);
      }
      .file-item:last-child {
        margin-bottom: 0;
      }
      .file-item i {
        color: var(--text-muted);
      }

      /* Controls Area */
      #controls {
        padding: 16px 20px;
        border-top: 1px solid var(--border-color);
        background: var(--bg-header);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #attachments-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        max-height: 100px;
        overflow-y: auto;
      }
      .attachment-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        padding: 6px 10px;
        font-size: 12px;
        color: var(--text-secondary);
      }
      .attachment-chip i {
        font-size: 14px;
      }
      .attachment-chip .remove-att {
        cursor: pointer;
        color: var(--text-muted);
      }
      .attachment-chip .remove-att:hover {
        color: var(--danger);
      }

      .input-wrapper {
        background: var(--bg-input);
        border: 1px solid var(--border-color);
        padding: 8px;
        transition: border-color 0.2s, background 0.25s ease;
      }
      .input-wrapper:focus-within {
        border-color: var(--accent);
      }

      #prompt {
        width: 100%;
        padding: 8px;
        border: none;
        background: transparent;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 14px;
        resize: none;
        max-height: 120px;
        min-height: 40px;
        outline: none;
      }
      #prompt::placeholder {
        color: var(--text-muted);
      }

      .button-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
        gap: 8px;
      }
      .button-group > div {
        display: flex;
        gap: 8px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 16px;
        height: 40px;
        background: var(--accent);
        color: var(--on-accent-text);
        border: 1px solid transparent;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        flex: 0 0 auto;
      }
      button:hover {
        background: var(--accent-hover);
        color: var(--on-accent-text);
      }
      button:active {
        transform: scale(0.98);
      }

      button.secondary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        width: 40px;
        padding: 0;
      }
      button.secondary:hover {
        background: var(--bg-sidebar);
        color: var(--accent);
        border-color: var(--accent);
      }

      button.tertiary {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border-color);
        font-size: 13px;
        font-weight: 500;
        padding: 0 16px;
      }
      button.tertiary.active {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--success-bg);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #file,
      #folder-input {
        display: none;
      }

      /* Loader */
      .loader {
        width: 35px;
        aspect-ratio: 1;
        --_g: no-repeat
          radial-gradient(farthest-side, var(--loader-dot) 94%, #0000);
        background: var(--_g) 0 0, var(--_g) 100% 0, var(--_g) 100% 100%,
          var(--_g) 0 100%;
        background-size: 40% 40%;
        animation: l38 0.5s infinite;
      }
      @keyframes l38 {
        100% {
          background-position: 100% 0, 100% 100%, 0 100%, 0 0;
        }
      }

      @media (max-width: 1024px) {
        body {
          flex-direction: column;
        }
        .left-pane {
          width: 100%;
          flex: 1 1 50%;
          border-right: none;
          border-bottom: 1px solid var(--border-color);
        }
        #resizer {
          display: none;
        }
        #sidebar {
          width: 100%;
          flex: 1 1 50%;
          border-left: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="left-pane">
      <div class="left-toggle">
        <button id="view-screen" class="active">
          <i class="ti ti-terminal-2"></i> Live DevBox
        </button>
        <button id="view-files"><i class="ti ti-folders"></i> Files</button>
        <button id="view-changes">
          <i class="ti ti-git-compare"></i> Diffs
        </button>
      </div>
      <div class="content-wrapper">
        <div id="screen"></div>
        <div id="files-view" class="view-pane">
          <div class="empty-state">
            <i class="ti ti-folder-off"></i>
            <p>No files presented yet.</p>
          </div>
        </div>
        <div id="changes-view" class="view-pane">
          <div class="empty-state">
            <i class="ti ti-git-compare"></i>
            <p>No diffs tracked yet.</p>
          </div>
        </div>
      </div>
    </div>

    <div id="resizer"></div>

    <div id="sidebar">
      <div class="sidebar-header">
        <div class="header-row">
          <div class="session-badge">
            <i class="ti ti-hash"></i>
            Session: <span id="session">pending</span>
          </div>
          <button
            id="theme-toggle"
            class="theme-toggle"
            title="Toggle light / dark mode"
            aria-label="Toggle theme"
          >
            <i class="ti ti-sun"></i>
          </button>
        </div>
      </div>

      <div id="chat"></div>

      <div id="controls">
        <div id="attachments-preview"></div>

        <div class="input-wrapper">
          <textarea
            id="prompt"
            rows="1"
            placeholder="Ask the LLM to do something..."
          ></textarea>
          <div class="button-group">
            <div>
              <button class="secondary" id="upload-btn" title="Attach File">
                <i class="ti ti-paperclip"></i>
              </button>
              <button class="secondary" id="folder-btn" title="Attach Folder">
                <i class="ti ti-folder"></i>
              </button>
              <button
                class="tertiary"
                id="thinking-btn"
                title="Toggle Thinking Level"
              >
                <i class="ti ti-brain"></i> Thinking:
                <span id="thinking-level">Low</span>
              </button>
            </div>
            <button id="send"><i class="ti ti-send"></i> Send</button>
          </div>
        </div>
        <input type="file" id="file" multiple />
        <input
          type="file"
          id="folder-input"
          webkitdirectory
          directory
          multiple
        />
      </div>
    </div>

    <script src="/v86/libv86.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fzstd@0.1.1/umd/index.js"></script>
    <script>
      // --- Global Application State ---
      let ws = null;
      let emulator = null;
      let sessionId = null;
      let vmBooted = false;
      let vmReady = false;
      let serialBuffer = "";
      let commandQueue = [];
      let isProcessing = false;
      let exportedFiles = [];
      let pendingFiles = [];
      let diffLog = []; // Array of { id, file, diff, sessionId, timestamp, hidden }
      let currentDiffSessionId = null;

      const MAX_FILE_SIZE = 100 * 1024 * 1024;
      const thinkingLevels = ["Low", "Normal", "High"];
      let currentThinking = 0;

      // --- DOM Element Selection ---
      const sessionEl = document.getElementById("session");
      const promptEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("send");
      const uploadBtn = document.getElementById("upload-btn");
      const folderBtn = document.getElementById("folder-btn");
      const thinkingBtn = document.getElementById("thinking-btn");
      const thinkingLevelEl = document.getElementById("thinking-level");
      const fileInput = document.getElementById("file");
      const folderInput = document.getElementById("folder-input");
      const screen = document.getElementById("screen");
      const filesView = document.getElementById("files-view");
      const changesView = document.getElementById("changes-view");
      const viewScreenBtn = document.getElementById("view-screen");
      const viewFilesBtn = document.getElementById("view-files");
      const viewChangesBtn = document.getElementById("view-changes");
      const chatEl = document.getElementById("chat");
      const attachmentsPreview = document.getElementById("attachments-preview");
      const resizer = document.getElementById("resizer");
      const sidebar = document.getElementById("sidebar");
      const themeToggle = document.getElementById("theme-toggle");
      const themeToggleIcon = themeToggle.querySelector("i");
      const SCROLL_THRESHOLD = 80; // px from bottom still counts as "at bottom"

      function isUserNearBottom() {
        const distFromBottom =
          chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight;
        return distFromBottom <= SCROLL_THRESHOLD;
      }

      function smartScroll() {
        if (isUserNearBottom()) chatEl.scrollTop = chatEl.scrollHeight;
      }

      // --- Theme Toggle Logic ---
      function applyThemeIcon(theme) {
        themeToggleIcon.className =
          theme === "light" ? "ti ti-moon" : "ti ti-sun";
      }
      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        try {
          localStorage.setItem("eyecode-theme", theme);
        } catch (e) {}
        applyThemeIcon(theme);
      }
      applyThemeIcon(
        document.documentElement.getAttribute("data-theme") || "dark"
      );
      themeToggle.addEventListener("click", () => {
        const current =
          document.documentElement.getAttribute("data-theme") || "dark";
        setTheme(current === "dark" ? "light" : "dark");
      });

      // --- View Toggle Logic ---
      function switchView(view) {
        screen.style.display = view === "screen" ? "block" : "none";
        filesView.classList.toggle("active", view === "files");
        changesView.classList.toggle("active", view === "changes");

        viewScreenBtn.classList.toggle("active", view === "screen");
        viewFilesBtn.classList.toggle("active", view === "files");
        viewChangesBtn.classList.toggle("active", view === "changes");
      }

      viewScreenBtn.addEventListener("click", () => switchView("screen"));
      viewFilesBtn.addEventListener("click", () => switchView("files"));
      viewChangesBtn.addEventListener("click", () => switchView("changes"));

      // --- Resizer Logic ---
      let isResizing = false;
      resizer.addEventListener("mousedown", () => {
        isResizing = true;
        resizer.classList.add("active");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
      });
      document.addEventListener("mousemove", (e) => {
        if (!isResizing) return;
        const sidebarWidth = window.innerWidth - e.clientX;
        if (sidebarWidth > 320 && sidebarWidth < 900) {
          sidebar.style.flexBasis = sidebarWidth + "px";
          sidebar.style.width = sidebarWidth + "px";
        }
      });
      document.addEventListener("mouseup", () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove("active");
          document.body.style.cursor = "default";
          document.body.style.userSelect = "auto";
        }
      });

      // --- Thinking Button Logic ---
      thinkingBtn.addEventListener("click", () => {
        currentThinking = (currentThinking + 1) % 3;
        thinkingLevelEl.textContent = thinkingLevels[currentThinking];
        thinkingBtn.classList.toggle("active", currentThinking > 0);
      });

      // --- Dropdown Menu Factory ---
      function createDropdown(items) {
        const wrapper = document.createElement("div");
        wrapper.className = "dropdown-wrapper";

        const trigger = document.createElement("button");
        trigger.className = "dropdown-trigger";
        trigger.innerHTML = '<i class="ti ti-dots-vertical"></i>';
        trigger.title = "More options";
        wrapper.appendChild(trigger);

        const menu = document.createElement("div");
        menu.className = "dropdown-menu";
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.className = "dropdown-item" + (item.danger ? " danger" : "");
          btn.innerHTML = `<i class="ti ${item.icon}"></i> ${item.label}`;
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            menu.classList.remove("show");
            item.onClick();
          });
          menu.appendChild(btn);
        });
        wrapper.appendChild(menu);

        trigger.addEventListener("click", (e) => {
          e.stopPropagation();
          document.querySelectorAll(".dropdown-menu.show").forEach((m) => {
            if (m !== menu) m.classList.remove("show");
          });
          menu.classList.toggle("show");
        });

        return wrapper;
      }

      // Close all dropdowns on outside click
      document.addEventListener("click", () => {
        document
          .querySelectorAll(".dropdown-menu.show")
          .forEach((m) => m.classList.remove("show"));
      });

      // --- Render Logic: Files View ---
      function renderFilesView() {
        filesView.innerHTML = "";
        if (exportedFiles.length === 0) {
          filesView.innerHTML = `<div class="empty-state"><i class="ti ti-folder-off"></i><p>No files presented yet.</p></div>`;
          return;
        }

        // Action bar with Download Workspace button
        const actionBar = document.createElement("div");
        actionBar.className = "view-action-bar";

        const downloadWsBtn = document.createElement("button");
        downloadWsBtn.className = "tertiary";
        downloadWsBtn.innerHTML =
          '<i class="ti ti-file-zip"></i> Download Workspace';
        downloadWsBtn.addEventListener("click", downloadWorkspace);
        actionBar.appendChild(downloadWsBtn);
        filesView.appendChild(actionBar);

        exportedFiles.forEach((file) => {
          const card = document.createElement("div");
          card.className = "file-card";

          const icon = document.createElement("i");
          icon.className = "ti ti-file-code";

          const nameSpan = document.createElement("span");
          nameSpan.textContent = file;

          card.appendChild(icon);
          card.appendChild(nameSpan);

          // Dropdown menu
          const menu = createDropdown([
            {
              label: "Delete File",
              icon: "ti-trash",
              danger: true,
              onClick: () => deleteFile(file),
            },
            {
              label: "Download",
              icon: "ti-download",
              onClick: () => downloadFile(file),
            },
            {
              label: "Attach File",
              icon: "ti-paperclip",
              onClick: () => attachFileToMessage(file),
            },
            {
              label: "Download Zipped",
              icon: "ti-file-zip",
              onClick: () => downloadFileZipped(file),
            },
          ]);
          card.appendChild(menu);

          filesView.appendChild(card);
        });
      }

      // --- Render Logic: Changes View ---
      function renderChangesView() {
        changesView.innerHTML = "";

        // Header with Clear Difflog button
        const header = document.createElement("div");
        header.className = "changes-header";

        const clearBtn = document.createElement("button");
        clearBtn.className = "clear-difflog-btn";
        clearBtn.id = "clear-difflog-btn";
        clearBtn.innerHTML = '<i class="ti ti-trash"></i> Clear Difflog';
        clearBtn.disabled = diffLog.length === 0;
        clearBtn.addEventListener("click", clearDiffLog);
        header.appendChild(clearBtn);
        changesView.appendChild(header);

        // Body wrapper for scrolling
        const bodyWrapper = document.createElement("div");
        bodyWrapper.className = "changes-body";

        const visibleDiffs = diffLog.filter((d) => !d.hidden);

        if (visibleDiffs.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.style.marginTop = "40px";
          empty.innerHTML = `<i class="ti ti-git-compare"></i><p>${
            diffLog.length > 0
              ? "All diffs are hidden. Clear difflog to reset."
              : "No diffs tracked yet."
          }</p>`;
          bodyWrapper.appendChild(empty);
          changesView.appendChild(bodyWrapper);
          return;
        }

        let lastSession = null;
        visibleDiffs.forEach((entry) => {
          // Session separator
          if (entry.sessionId !== lastSession) {
            const sep = document.createElement("div");
            sep.className = "session-separator";
            const shortId = entry.sessionId
              ? entry.sessionId.slice(0, 8)
              : "unknown";
            sep.innerHTML = `<span class="session-label"><i class="ti ti-hash"></i> Session: ${shortId}</span>`;
            bodyWrapper.appendChild(sep);
            lastSession = entry.sessionId;
          }

          // Diff card
          bodyWrapper.appendChild(createDiffCard(entry));
        });

        changesView.appendChild(bodyWrapper);
      }

      function createDiffCard(entry) {
        const card = document.createElement("div");
        card.className = "change-card";

        const header = document.createElement("div");
        header.className = "change-card-header";

        const icon = document.createElement("i");
        icon.className = "ti ti-file-code";

        const filename = document.createElement("span");
        filename.className = "filename";
        filename.textContent = entry.file;

        const count = document.createElement("span");
        count.className = "change-count";
        const added = entry.diff.filter((l) => l.type === "added").length;
        const removed = entry.diff.filter((l) => l.type === "removed").length;
        count.textContent = `+${added} -${removed}`;

        const toggleIcon = document.createElement("i");
        toggleIcon.className = "ti ti-chevron-down toggle-icon";

        header.appendChild(icon);
        header.appendChild(filename);
        header.appendChild(count);

        // Dropdown menu for diffs
        const menu = createDropdown([
          {
            label: "Hide Diff",
            icon: "ti-eye-off",
            onClick: () => hideDiff(entry.id),
          },
          {
            label: "Attach Diff",
            icon: "ti-paperclip",
            onClick: () => attachDiffToMessage(entry),
          },
          {
            label: "Download Diff",
            icon: "ti-download",
            onClick: () => downloadDiff(entry),
          },
        ]);
        header.appendChild(menu);
        header.appendChild(toggleIcon);

        const body = document.createElement("div");
        body.className = "change-card-body";
        body.style.display = "none";
        body.appendChild(createDiffBlock(entry.file, entry.diff));

        header.addEventListener("click", (e) => {
          if (e.target.closest(".dropdown-wrapper")) return;
          const isOpen = body.style.display === "flex";
          body.style.display = isOpen ? "none" : "flex";
          toggleIcon.className = isOpen
            ? "ti ti-chevron-down toggle-icon"
            : "ti ti-chevron-up toggle-icon";
        });

        card.appendChild(header);
        card.appendChild(body);
        return card;
      }

      // --- Utility Formatters ---
      function formatFileSize(bytes) {
        if (bytes === 0) return "0 B";
        const k = 1024;
        const sizes = ["B", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
      }
      function formatAttachmentDisplay(file) {
        const fullPath = file.webkitRelativePath || file.name;
        const filename = fullPath.split("/").pop();
        const lastDot = filename.lastIndexOf(".");
        let base = filename,
          ext = "FILE";
        if (lastDot > 0) {
          base = filename.substring(0, lastDot);
          ext = filename.substring(lastDot + 1).toUpperCase();
        }
        const truncBase = base.length > 8 ? base.substring(0, 8) + "..." : base;
        return `${truncBase} (${formatFileSize(file.size)}) .${ext}`;
      }

      function formatDiffAsText(file, diffData) {
        let text = `--- a/${file}\n+++ b/${file}\n\n`;
        diffData.forEach((line) => {
          const sign =
            line.type === "added" ? "+" : line.type === "removed" ? "-" : " ";
          text += `${sign} ${line.text}\n`;
        });
        return text;
      }

      // --- File Action Handlers ---
      async function fetchFileBlob(filename) {
        const response = await fetch(
          `/api/file?name=${encodeURIComponent(filename)}&sid=${sessionId}`
        );
        if (!response.ok) throw new Error(`Server returned ${response.status}`);
        return response.blob();
      }

      async function deleteFile(filename) {
        if (!confirm(`Delete "${filename}"? This cannot be undone.`)) return;
        try {
          const response = await fetch(
            `/api/file?name=${encodeURIComponent(filename)}&sid=${sessionId}`,
            { method: "DELETE" }
          );
          if (response.ok) {
            exportedFiles = exportedFiles.filter((f) => f !== filename);
            renderFilesView();
          } else {
            throw new Error(`Server returned ${response.status}`);
          }
        } catch (err) {
          addChatMessage(
            "system",
            `Error deleting ${filename}: ${err.message},  Try clearing cache or reloading`,
            "System"
          );
        }
      }

      async function downloadFile(filename) {
        try {
          const blob = await fetchFileBlob(filename);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename.split("/").pop();
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          addChatMessage(
            "system",
            `Error downloading ${filename}: ${err.message}, Try clearing cache or reloading`,
            "System"
          );
        }
      }

      async function attachFileToMessage(filename) {
        try {
          const blob = await fetchFileBlob(filename);
          const file = new File([blob], filename.split("/").pop(), {
            type: blob.type || "application/octet-stream",
          });
          pendingFiles.push(file);
          renderAttachments();
        } catch (err) {
          addChatMessage(
            "system",
            `Error attaching ${filename}: ${err.message},  Try clearing cache or reloading`,
            "System"
          );
        }
      }

      async function downloadFileZipped(filename) {
        if (typeof JSZip === "undefined") {
          addChatMessage(
            "system",
            "JSZip library not loaded,  Try clearing cache or reloading",
            "System"
          );
          return;
        }
        try {
          const blob = await fetchFileBlob(filename);
          const zip = new JSZip();
          zip.file(filename.split("/").pop(), blob);
          const zipBlob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(zipBlob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${filename.split("/").pop()}.zip`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        } catch (err) {
          addChatMessage(
            "system",
            `Error zipping ${filename}: ${err.message}, Try clearing cache or reloading`,
            "System"
          );
        }
      }

      async function downloadWorkspace() {
        if (exportedFiles.length === 0) {
          addChatMessage("system", "No files left to download.", "System");
          return;
        }
        if (typeof JSZip === "undefined") {
          addChatMessage(
            "system",
            "JSZip library not loaded,  Try clearing cache or reloading",
            "System"
          );
          return;
        }
        addChatMessage(
          "system",
          "Packaging your workspace... hang tight",
          "System"
        );
        try {
          const zip = new JSZip();
          let successCount = 0;
          for (const filename of exportedFiles) {
            try {
              const blob = await fetchFileBlob(filename);
              zip.file(filename, blob);
              successCount++;
            } catch (e) {
              console.warn(`Failed to fetch ${filename}:`, e);
            }
          }
          if (successCount === 0)
            throw new Error("No files could be downloaded.");
          const zipBlob = await zip.generateAsync({ type: "blob" });
          const url = URL.createObjectURL(zipBlob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `workspace_${
            sessionId ? sessionId.slice(0, 8) : "export"
          }.zip`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          addChatMessage(
            "system",
            `Workspace Downloaded sucssfully (${successCount}/${exportedFiles.length} files)`,
            "System"
          );
        } catch (err) {
          addChatMessage(
            "system",
            `Error downloading workspace: ${err.message}, Try clearing cache or reloading`,
            "System"
          );
        }
      }

      // --- Diff Action Handlers ---
      function hideDiff(diffId) {
        const entry = diffLog.find((d) => d.id === diffId);
        if (entry) {
          entry.hidden = true;
          renderChangesView();
        }
      }

      function attachDiffToMessage(entry) {
        const diffText = formatDiffAsText(entry.file, entry.diff);
        const file = new File(
          [diffText],
          `${entry.file.split("/").pop()}.diff.txt`,
          { type: "text/plain" }
        );
        pendingFiles.push(file);
        renderAttachments();
      }

      function downloadDiff(entry) {
        const diffText = formatDiffAsText(entry.file, entry.diff);
        const blob = new Blob([diffText], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${entry.file.split("/").pop()}.diff.txt`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function clearDiffLog() {
        if (diffLog.length === 0) return;
        if (
          !confirm("Clear ALL diffs from the difflog? This cannot be undone.")
        )
          return;
        diffLog = [];
        renderChangesView();
      }

      // --- Attachments Queue Logic ---
      function handleFilesSelected(files) {
        Array.from(files).forEach((file) => {
          if (file.size > MAX_FILE_SIZE) {
            addChatMessage(
              "system",
              `${file.name} exceeds the 100MB limit, Try uploading a Smaller file`,
              "System"
            );
          } else {
            pendingFiles.push(file);
          }
        });
        renderAttachments();
      }
      function renderAttachments() {
        attachmentsPreview.innerHTML = "";
        pendingFiles.forEach((file, index) => {
          const chip = document.createElement("div");
          chip.className = "attachment-chip";
          chip.innerHTML = `<i class="ti ti-file"></i> <span>${formatAttachmentDisplay(
            file
          )}</span> <i class="ti ti-x remove-att" data-index="${index}"></i>`;
          attachmentsPreview.appendChild(chip);
        });
      }
      attachmentsPreview.addEventListener("click", (e) => {
        if (e.target.classList.contains("remove-att")) {
          pendingFiles.splice(parseInt(e.target.getAttribute("data-index")), 1);
          renderAttachments();
        }
      });
      function appendChatAttachments(files) {
        const lastMsg = chatEl.lastChild;
        if (!lastMsg) return;
        const wasNearBottom = isUserNearBottom();
        const attContainer = document.createElement("div");
        attContainer.className = "chat-attachments";
        files.forEach((file) => {
          const chip = document.createElement("div");
          chip.className = "attachment-chip";
          chip.innerHTML = `<i class="ti ti-file"></i> <span>${formatAttachmentDisplay(
            file
          )}</span>`;
          attContainer.appendChild(chip);
        });
        lastMsg.appendChild(attContainer);
        smartScroll();
      }

      // --- UI Display Helpers ---
      function showTypingIndicator() {
        hideTypingIndicator();
        const wasNearBottom = isUserNearBottom();
        const msgDiv = document.createElement("div");
        msgDiv.className = "chat-message llm";
        msgDiv.id = "typing-indicator";
        msgDiv.style.maxWidth = "80px";
        const contentDiv = document.createElement("div");
        contentDiv.className = "message-content llm";
        contentDiv.style.padding = "12px";
        contentDiv.style.display = "flex";
        contentDiv.innerHTML = `<div class="loader"></div>`;
        msgDiv.appendChild(contentDiv);
        chatEl.appendChild(msgDiv);
        smartScroll();
      }
      function hideTypingIndicator() {
        const ind = document.getElementById("typing-indicator");
        if (ind) ind.remove();
      }
      function addChatMessage(role, content, label = null) {
        const wasNearBottom = isUserNearBottom();
        const msgDiv = document.createElement("div");
        msgDiv.className = `chat-message ${role}`;
        if (label) {
          const labelEl = document.createElement("div");
          labelEl.className = "message-header";
          let icon = "ti ti-message";
          if (role === "user") icon = "ti ti-user";
          if (role === "llm") icon = "ti ti-robot";
          if (role === "system") icon = "ti ti-info-circle";
          labelEl.innerHTML = `<i class="${icon}"></i> ${label}`;
          msgDiv.appendChild(labelEl);
        }
        const contentDiv = document.createElement("div");
        contentDiv.className = `message-content ${role}`;
        contentDiv.textContent = content;
        msgDiv.appendChild(contentDiv);
        chatEl.appendChild(msgDiv);
        smartScroll();
      }
      function createTerminalBlock(title, bodyHtml) {
        const block = document.createElement("div");
        block.className = "terminal-block";
        block.innerHTML = `
      <div class="terminal-header">
        <div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div>
        <span style="margin-left: 8px;">${title}</span>
      </div>
      <div class="terminal-body">${bodyHtml}</div>`;
        return block;
      }
      function addCommandOutput(cmd) {
        const msgDiv = document.createElement("div");
        const wasNearBottom = isUserNearBottom();
        msgDiv.className = "chat-message llm";
        msgDiv.style.maxWidth = "100%";
        const labelEl = document.createElement("div");
        labelEl.className = "message-header";
        labelEl.innerHTML = `<i class="ti ti-bolt"></i> Executing: ${
          cmd.tool || "Shell"
        }`;
        msgDiv.appendChild(labelEl);
        let bodyHtml = "";
        if (cmd.reasoning)
          bodyHtml += `<span class="reasoning">${cmd.reasoning}</span>`;
        if (cmd.command)
          bodyHtml += `<span style="color: var(--reasoning-text);">$</span> ${cmd.command}`;
        msgDiv.appendChild(createTerminalBlock("bash", bodyHtml));
        chatEl.appendChild(msgDiv);
        smartScroll();
      }
      function addCommandResult(cmd, output) {
        const msgDiv = document.createElement("div");
        const wasNearBottom = isUserNearBottom();
        msgDiv.className = "chat-message llm";
        msgDiv.style.maxWidth = "100%";
        const labelEl = document.createElement("div");
        labelEl.className = "message-header";
        labelEl.innerHTML = `<i class="ti ti-clipboard-list"></i> Output`;
        msgDiv.appendChild(labelEl);
        const safeOutput = output.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        msgDiv.appendChild(
          createTerminalBlock("output", safeOutput || "No output returned.")
        );
        chatEl.appendChild(msgDiv);
        smartScroll();
      }
      function addFilesExport(files) {
        const msgDiv = document.createElement("div");
        const wasNearBottom = isUserNearBottom();
        msgDiv.className = "chat-message llm";
        msgDiv.style.maxWidth = "100%";
        const labelEl = document.createElement("div");
        labelEl.className = "message-header";
        labelEl.innerHTML = `<i class="ti ti-file-export"></i> Exported Files`;
        msgDiv.appendChild(labelEl);
        const filesSection = document.createElement("div");
        filesSection.className = "files-section";
        const titleEl = document.createElement("div");
        titleEl.className = "files-title";
        titleEl.innerHTML = `<i class="ti ti-folder"></i> Artifacts`;
        filesSection.appendChild(titleEl);
        if (files && files.length > 0) {
          files.forEach((file) => {
            const fileItem = document.createElement("div");
            fileItem.className = "file-item";
            fileItem.innerHTML = `<i class="ti ti-file"></i> ${file}`;
            filesSection.appendChild(fileItem);
            if (!exportedFiles.includes(file)) exportedFiles.push(file);
          });
          renderFilesView();
        } else {
          const emptyItem = document.createElement("div");
          emptyItem.className = "file-item";
          emptyItem.innerHTML = `<i class="ti ti-file-off"></i> No files generated`;
          filesSection.appendChild(emptyItem);
        }
        msgDiv.appendChild(filesSection);
        chatEl.appendChild(msgDiv);
        smartScroll();
      }

      // --- Diff Tracker Logic ---
      function createDiffBlock(file, diffData) {
        const block = document.createElement("div");
        block.className = "diff-block";

        const header = document.createElement("div");
        header.className = "diff-header";
        header.innerHTML = `<i class="ti ti-file-diff"></i> <span>${file}</span>`;

        const body = document.createElement("div");
        body.className = "diff-body";

        let lineNumOld = 1;
        let lineNumNew = 1;

        diffData.forEach((line) => {
          const lineEl = document.createElement("div");
          lineEl.className = `diff-line ${line.type}`;

          let numOld = "",
            numNew = "";
          if (line.type === "context") {
            numOld = lineNumOld++;
            numNew = lineNumNew++;
          } else if (line.type === "added") {
            numNew = lineNumNew++;
          } else if (line.type === "removed") {
            numOld = lineNumOld++;
          }

          const sign =
            line.type === "added" ? "+" : line.type === "removed" ? "-" : " ";
          lineEl.innerHTML = `<span class="line-num">${numOld}</span><span class="line-num">${numNew}</span><span class="line-sign">${sign}</span><span class="line-text"></span>`;
          lineEl.querySelector(".line-text").textContent = line.text;
          body.appendChild(lineEl);
        });

        block.appendChild(header);
        block.appendChild(body);
        return block;
      }

      function addFileDiff(file, diffData) {
        const wasNearBottom = isUserNearBottom();
        const entry = {
          id: Date.now() + Math.random(),
          file: file,
          diff: diffData,
          sessionId: currentDiffSessionId || sessionId || "unknown",
          timestamp: Date.now(),
          hidden: false,
        };
        diffLog.push(entry);

        // Add to chat
        const msgDiv = document.createElement("div");
        msgDiv.className = "chat-message llm";
        msgDiv.style.maxWidth = "100%";

        const labelEl = document.createElement("div");
        labelEl.className = "message-header";
        labelEl.innerHTML = `<i class="ti ti-file-diff"></i> Modified: ${file}`;
        msgDiv.appendChild(labelEl);

        msgDiv.appendChild(createDiffBlock(file, diffData));
        chatEl.appendChild(msgDiv);
        smartScroll();

        // Update changes view
        renderChangesView();
      }

      // --- Emulator Initialization ---
      async function initV86Emulator(customDiskPath = null) {
        let StarterConstructor = window.V86 || window.V86Starter;
        if (!StarterConstructor) {
          addChatMessage(
            "system",
            "V86 Engine binding missing, Try clearing cache, or reloading",
            "System"
          );
          return;
        }
        if (emulator) {
          try {
            emulator.destroy();
          } catch (e) {}
        }
        try {
          const config = {
            wasm_path: "/v86/v86.wasm",
            memory_size: 512 * 1024 * 1024,
            vga_memory_size: 16 * 1024 * 1024,
            screen_container: screen,
            bios: { url: "/v86/seabios.bin" },
            vga_bios: { url: "/v86/vgabios.bin" },
            autostart: true,
            disable_audio: true,
            serial_containers: document.getElementById("serial")
              ? ["#serial"]
              : undefined,
          };
          if (customDiskPath) {
            config.cdrom = { url: customDiskPath };
          } else {
            addChatMessage(
              "system",
              "Downloading the system disk...",
              "System"
            );
            const response = await fetch("/api/proxy-vm-image");
            if (!response.ok)
              throw new Error(
                "FATAL ERROR: Failed to pull system image, Try clearing cache, or reloading."
              );
            const compressedData = await response.arrayBuffer();
            if (typeof fzstd === "undefined")
              throw new Error("Decompression engine (fzstd) missing.");
            const decompressedBytes = fzstd.decompress(
              new Uint8Array(compressedData)
            );
            const diskBlob = new Blob([decompressedBytes], {
              type: "application/octet-stream",
            });
            const localBlobUrl = URL.createObjectURL(diskBlob);
            config.hda = { url: localBlobUrl, async: false };
            addChatMessage(
              "system",
              "Beginign to spin up virtual hardware...",
              "System"
            );
          }
          emulator = new StarterConstructor(config);
          vmBooted = true;
          if (sessionId && sessionEl)
            sessionEl.textContent = sessionId.slice(0, 8);
          monitorSerialPort();
        } catch (error) {
          console.error(
            "FATAL ERROR: Critical failure during StartVM, Try clearing cache, or reloading:",
            error
          );
          addChatMessage(
            "system",
            `FATAL ERROR: StartVM Failure: ${error.message}, Try clearing cache, or reloading`,
            "System"
          );
        }
      }
      function monitorSerialPort() {
        if (!emulator) return;
        emulator.add_listener("serial0-output-char", (char) => {
          serialBuffer += char;
          if (serialBuffer.includes("#") || serialBuffer.includes("$")) {
            vmReady = true;
            if (vmBooted && serialBuffer.length > 2) {
              addChatMessage("system", "VM ready - ttyS0 responding", "System");
              vmBooted = false;
            }
          }
        });
      }
      async function executeCommand(cmd) {
        if (!emulator) return "";
        emulator.serial0_send(cmd + "\n");
        return new Promise((resolve) => {
          let output = "";
          let timeout = setTimeout(() => resolve(output), 2000);
          const listener = (char) => {
            output += char;
            clearTimeout(timeout);
            timeout = setTimeout(() => {
              emulator.remove_listener("serial0-output-char", listener);
              resolve(output);
            }, 1000);
          };
          emulator.add_listener("serial0-output-char", listener);
        });
      }
      async function processQueueItem(item) {
        isProcessing = true;
        try {
          addCommandOutput(item.cmd);
          if (item.cmd.command) {
            const output = await executeCommand(item.cmd.command);
            addCommandResult(item.cmd, output);
            serialBuffer = output;
          }
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(
              JSON.stringify({
                type: "llm_query",
                payload: {
                  prompt: `VM Output:\n${serialBuffer}\n\nWhat should I do next?`,
                  vmOutput: serialBuffer,
                },
              })
            );
          }
        } catch (e) {
          console.error("Queue processing error:", e);
        } finally {
          isProcessing = false;
          if (commandQueue.length > 0)
            setTimeout(() => processQueueItem(commandQueue.shift()), 500);
        }
      }

      // --- Network Layer ---
      function connect() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.addEventListener("message", (event) => {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case "session_created":
              sessionId = msg.sessionId;
              currentDiffSessionId = msg.sessionId;
              if (sessionEl) sessionEl.textContent = sessionId.slice(0, 8);
              addChatMessage("system", "VM session started", "System");
              initV86Emulator();
              break;
            case "boot_confirm":
              vmBooted = true;
              addChatMessage(
                "system",
                "Starting Engines, The VM is booting...",
                "System"
              );
              break;
            case "llm_response":
              hideTypingIndicator();
              addChatMessage("llm", msg.response, "Assistant");
              if (msg.commands && msg.commands.length > 0) {
                msg.commands.forEach((cmd) => {
                  if (!isProcessing) {
                    commandQueue.push({ cmd });
                    processQueueItem(commandQueue.shift());
                  } else {
                    commandQueue.push({ cmd });
                  }
                });
              }
              break;
            case "command_executed":
              addCommandResult(msg.command, msg.output);
              break;
            case "file_added":
              break;
            case "files_exported":
              addFilesExport(msg.files);
              break;
            case "file_diff":
              addFileDiff(msg.file, msg.diff);
              break;
            case "file_list":
              if (msg.files.length > 0)
                addChatMessage(
                  "system",
                  "Files: " + msg.files.join(", "),
                  "System"
                );
              break;
          }
        });
        ws.addEventListener("close", () => {
          console.warn("WebSocket disconnected. Reconnecting...");
          addChatMessage(
            "system",
            "Connection lost. Reconnecting...",
            "System"
          );
          setTimeout(connect, 3000);
        });
      }

      // --- Input Handlers ---
      async function handleSendPrompt() {
        if (!promptEl) return;
        let promptText = promptEl.value.trim();
        if (!promptText && pendingFiles.length === 0) return;
        if (promptText === "" && pendingFiles.length > 0)
          promptText = "Uploaded the following files:";
        addChatMessage("user", promptText, "You");
        if (pendingFiles.length > 0) appendChatAttachments(pendingFiles);
        promptEl.value = "";
        sendBtn.disabled = true;
        showTypingIndicator();
        if (pendingFiles.length > 0) {
          const formData = new FormData();
          formData.append("sid", sessionId);

          pendingFiles.forEach((file, idx) => {
            const fileName = file.webkitRelativePath || file.name;
            formData.append("files", file, fileName);
            formData.append(`fileName_${idx}`, fileName);
          });

          try {
            const response = await fetch(`/upload?sid=${sessionId}`, {
              method: "POST",
              body: formData,
            });
            if (!response.ok) {
              const txt = await response.text();
              throw new Error(`Server returned ${response.status}: ${txt}`);
            }
            const result = await response.json();

            const disks = Array.isArray(result.files)
              ? result.files.filter((f) => f.isDisk && f.filePath)
              : result.isDisk && result.filePath
              ? [result]
              : [];

            if (disks.length) initV86Emulator(disks[0].filePath);
          } catch (err) {
            console.error("Batch upload failure:", err);
            addChatMessage(
              "system",
              `Error uploading ${pendingFiles.length} file(s): ${err.message}, Try clearing cache or reloading`,
              "System"
            );
          } finally {
            pendingFiles = [];
            renderAttachments();
          }
        }
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              type: "user_prompt",
              payload: {
                prompt: promptText,
                thinkingLevel: thinkingLevels[currentThinking],
              },
            })
          );
        } else {
          addChatMessage(
            "system",
            "Unable to forward message, Please reload the site, or contine in a diffrent session",
            "System"
          );
          hideTypingIndicator();
        }
        sendBtn.disabled = false;
      }

      if (sendBtn) sendBtn.addEventListener("click", handleSendPrompt);
      if (promptEl) {
        promptEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            handleSendPrompt();
          }
        });
      }
      if (uploadBtn)
        uploadBtn.addEventListener("click", () => fileInput.click());
      if (folderBtn)
        folderBtn.addEventListener("click", () => folderInput.click());
      if (fileInput)
        fileInput.addEventListener("change", async (e) => {
          handleFilesSelected(e.target.files);
          fileInput.value = "";
        });
      if (folderInput)
        folderInput.addEventListener("change", async (e) => {
          handleFilesSelected(e.target.files);
          folderInput.value = "";
        });

      // --- Initialize ---
      document.addEventListener("DOMContentLoaded", () => {
        connect();
        renderFilesView();
        renderChangesView();

        // Mock diff for demonstration purposes (remove in production)
        setTimeout(() => {
          addFileDiff("main.py", [
            { type: "context", text: "import os" },
            { type: "removed", text: "print('Starting app')" },
            { type: "added", text: "print('Initializing EyeCode...')" },
            { type: "context", text: "" },
            { type: "added", text: "def run():" },
            { type: "added", text: "    pass" },
          ]);
        }, 3000);
      });
    </script>
  </body>
